name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: monitor-ctrl
            asset_name: monitor-ctrl-linux-x86_64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: monitor-ctrl.exe
            asset_name: monitor-ctrl-windows-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Install Rust
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # 3. Cache
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ matrix.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-cargo-

      # 4. Linux deps
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libudev-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libssl-dev \
            libgtk-3-dev

      # 5. Build
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      # 6A. Package Windows (.zip)
      - name: Package Windows binary
        if: matrix.os == 'windows-latest'
        run: |
          mkdir dist
          copy target\${{ matrix.target }}\release\${{ matrix.artifact_name }} dist\
          powershell Compress-Archive -Path dist\* -DestinationPath ${{ matrix.asset_name }}.zip

      # 6B. Package Linux (.tar.gz)
      - name: Package Linux binary
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} dist/
          tar -czvf ${{ matrix.asset_name }}.tar.gz -C dist .

      # 7. Upload packaged artifacts
      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            *.zip
            *.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      # Download artifacts
      - name: Download Linux package
        uses: actions/download-artifact@v4
        with:
          name: monitor-ctrl-linux-x86_64
          path: artifacts/

      - name: Download Windows package
        uses: actions/download-artifact@v4
        with:
          name: monitor-ctrl-windows-x86_64
          path: artifacts/

      # Create release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/monitor-ctrl-linux-x86_64.tar.gz
            artifacts/monitor-ctrl-windows-x86_64.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}