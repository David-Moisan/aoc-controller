name: Build and Release

on:
  push:
    tags:
      - 'v*'          
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: monitor-ctrl
            asset_name: monitor-ctrl-linux-x86_64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: monitor-ctrl.exe
            asset_name: monitor-ctrl-windows-x86_64.exe

    runs-on: ${{ matrix.os }}

    steps:
      # 1. Check out the source code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Install Rust on the runner machine
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # 3. Cache compiled dependencies so repeat builds are fast
      #    Without this, every build recompiles all crates from scratch (~3 min)
      #    With cache, only changed code recompiles (~30 sec)
      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ matrix.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-cargo-

      # 4. Linux only — install the i2c and GUI system libraries
      #    These are needed to compile ddc-hi and eframe on Ubuntu
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libudev-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libssl-dev \
            libgtk-3-dev

      # 5. Build the release binary
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      # 6. Upload the binary as a build artifact
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

  release:
    needs: build   # wait for the build job to finish
    runs-on: ubuntu-latest
    # Only create a release when triggered by a tag push, not manual dispatch
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: monitor-ctrl-linux-x86_64
          path: artifacts/

      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: monitor-ctrl-windows-x86_64.exe
          path: artifacts/

      # Rename files cleanly before attaching to release
      - name: Prepare release files
        run: |
          mv artifacts/monitor-ctrl       artifacts/monitor-ctrl-linux-x86_64
          mv artifacts/monitor-ctrl.exe   artifacts/monitor-ctrl-windows-x86_64.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/monitor-ctrl-linux-x86_64
            artifacts/monitor-ctrl-windows-x86_64.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}